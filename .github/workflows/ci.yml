name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  manifests:
    name: Manifests & skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml
      - name: Validate marketplace, plugins, skills and hooks
        run: python3 scripts/validate.py

  shell:
    name: Shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check (bash -n)
        run: |
          rc=0
          while IFS= read -r -d '' f; do
            echo "bash -n $f"
            bash -n "$f" || rc=1
          done < <(find . -path ./.git -prune -o -name '*.sh' -print0)
          exit $rc
      - name: ShellCheck
        run: |
          shellcheck --version
          find . -path ./.git -prune -o -name '*.sh' -print0 | xargs -0 --no-run-if-empty shellcheck
